name: Build and Release VyOS

on:
  push:
    tags:
      - "*-main*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build"
        required: false

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    container:
      image: vyos/vyos-build:current
      options: --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Prepare build environment
        run: |
          echo "PROJECT_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "VYOS_BUILD_ROOT=$GITHUB_WORKSPACE/vyos-build" >> $GITHUB_ENV
          echo "SCRIPT_DIR=$GITHUB_WORKSPACE/scripts" >> $GITHUB_ENV

      - name: Update package lists
        run: sudo apt-get update

      - name: Clone vyos-build
        run: git clone https://github.com/vyos/vyos-build

      - name: Build vyos-1x package
        run: bash "$SCRIPT_DIR/patch-and-build-vyos-1x.sh"

      - name: Build kernel package
        run: bash "$SCRIPT_DIR/patch-and-build-kernel.sh"

      - name: Build kernel-related packages
        run: bash "$SCRIPT_DIR/patch-and-build-kernel-related-packages.sh"

      - name: Clean kernel package tree
        run: rm -rf "$VYOS_BUILD_ROOT/scripts/package-build/linux-kernel"

      - name: Build Landscape package
        run: bash "$SCRIPT_DIR/build-landscape-package.sh"

      - name: Build VyOS image
        run: sudo -E bash "$SCRIPT_DIR/patch-and-build-vyos-image.sh"

      - name: Read build version
        id: build
        run: |
          echo "vyos_version=$(cat build/vyos_version)" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: vyos-build-${{ steps.build.outputs.vyos_version || github.run_id }}
          path: |
            build/vyos_version
            build/vyos-*.iso
          if-no-files-found: error
          retention-days: 7

      - name: Publish release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.build.outputs.vyos_version }}-${{ github.ref_name }}
          files: build/vyos-${{ steps.build.outputs.vyos_version }}-generic-amd64.iso
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
