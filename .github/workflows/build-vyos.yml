name: Build and Release VyOS

on:
  push:
    tags:
      - "*-main*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build"
        required: false

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    container:
      image: vyos/vyos-build:current
      options: --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Build all
        id: build
        run: |
          cd $GITHUB_WORKSPACE
          bash scripts/build-all.sh
          echo "vyos_version=$(cat build/vyos_version)" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: vyos-build-${{ steps.build.outputs.vyos_version || github.run_id }}
          path: |
            build/vyos_version
            build/vyos-*.iso
          if-no-files-found: error
          retention-days: 7

      - name: Publish release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.build.outputs.vyos_version }}-${{ github.ref_name }}
          files: build/vyos-${{ steps.build.outputs.vyos_version }}-generic-amd64.iso
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
